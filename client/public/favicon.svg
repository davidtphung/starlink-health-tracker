<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#000000"/>
  <!-- Bold Starlink-inspired dish/signal mark -->
  <g transform="translate(16, 18)">
    <!-- Three bold signal arcs radiating up-right -->
    <path d="M-8,4 Q-6,-4 0,-8 Q6,-10 10,-6" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M-5,6 Q-3,-1 2,-4 Q7,-6 10,-2" stroke="#ffffff" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M-2,8 Q0,2 4,0 Q8,-1 10,2" stroke="#ffffff" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.3"/>
    <!-- Bright satellite dot at the focal point -->
    <circle cx="-9" cy="5" r="2.5" fill="#ffffff"/>
  </g>
</svg>
