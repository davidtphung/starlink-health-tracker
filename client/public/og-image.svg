<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#000000"/>

  <!-- Subtle orbital grid lines -->
  <g opacity="0.04" stroke="#005288" stroke-width="1">
    <ellipse cx="850" cy="315" rx="300" ry="130" transform="rotate(-20 850 315)"/>
    <ellipse cx="850" cy="315" rx="220" ry="95" transform="rotate(-20 850 315)"/>
    <ellipse cx="850" cy="315" rx="140" ry="60" transform="rotate(-20 850 315)"/>
  </g>

  <!-- Large satellite illustration on right — matches favicon motif -->
  <g transform="translate(870, 290)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Orbital ring -->
    <ellipse cx="0" cy="0" rx="150" ry="65" transform="rotate(-35)" stroke="#005288" stroke-width="3" opacity="0.25"/>
    <!-- Satellite body -->
    <rect x="-30" y="-30" width="60" height="60" rx="10" fill="#005288" stroke="#a7d1f0" stroke-width="4"/>
    <!-- Solar panels -->
    <rect x="-110" y="-20" width="65" height="40" rx="6" stroke="#a7d1f0" stroke-width="3.5" opacity="0.7"/>
    <rect x="45" y="-20" width="65" height="40" rx="6" stroke="#a7d1f0" stroke-width="3.5" opacity="0.7"/>
    <!-- Panel lines -->
    <line x1="-77" y1="-20" x2="-77" y2="20" stroke="#a7d1f0" stroke-width="1.5" opacity="0.3"/>
    <line x1="77" y1="-20" x2="77" y2="20" stroke="#a7d1f0" stroke-width="1.5" opacity="0.3"/>
    <!-- Signal pulses -->
    <circle cx="45" cy="-55" r="8" fill="#a7d1f0" opacity="0.8"/>
    <circle cx="45" cy="-55" r="18" stroke="#a7d1f0" stroke-width="2" opacity="0.25"/>
    <circle cx="45" cy="-55" r="30" stroke="#a7d1f0" stroke-width="1.5" opacity="0.1"/>
    <!-- Satellite dots around orbit -->
    <circle cx="130" cy="-40" r="3" fill="#00c853" opacity="0.6"/>
    <circle cx="-100" cy="50" r="3" fill="#00c853" opacity="0.4"/>
    <circle cx="80" cy="55" r="2.5" fill="#00c853" opacity="0.5"/>
    <circle cx="-50" cy="-60" r="2" fill="#00c853" opacity="0.3"/>
  </g>

  <!-- Text block — left aligned -->
  <text x="80" y="230" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-0.02em">Starlink</text>
  <text x="80" y="310" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#a7d1f0" letter-spacing="-0.02em">Health Tracker</text>

  <text x="80" y="370" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="20" fill="rgba(255,255,255,0.35)" letter-spacing="0.08em">REAL-TIME CONSTELLATION MONITORING</text>

  <!-- Bottom attribution -->
  <line x1="80" y1="520" x2="140" y2="520" stroke="rgba(167,209,240,0.3)" stroke-width="2" stroke-linecap="round"/>
  <text x="155" y="525" font-family="Inter, system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">starlinkhealth.davidtphung.com</text>

  <!-- Status indicator -->
  <circle cx="80" y="415" cx="88" cy="415" r="4" fill="#00c853"/>
  <text x="100" y="420" font-family="Inter, system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="0.06em">LIVE DATA</text>
</svg>
