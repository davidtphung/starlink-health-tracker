    <path d="M-75,90 Q-50,-15 30,-60 Q105,-90 150,-30" stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M-30,120 Q0,30 60,0 Q120,-15 150,30" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="-135" cy="75" r="20" fill="#ffffff"/>
  </g>
  <!-- Text -->
  <text x="80" y="260" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-0.02em">Starlink Health</text>
  <text x="80" y="330" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="700" fill="rgba(255,255,255,0.35)" letter-spacing="-0.02em">Tracker</text>
  <text x="80" y="390" font-family="Inter, system-ui, sans-serif" font-size="18" fill="rgba(255,255,255,0.3)" letter-spacing="0.1em">REAL-TIME CONSTELLATION MONITORING</text>
